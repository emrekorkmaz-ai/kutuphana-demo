<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sayfa Bulunamadı - Yenişehir Kütüphaneleri</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="assets/style.css" rel="stylesheet">
<style>
.notfound-wrap { min-height: 60vh; display: flex; align-items: center; }
.notfound-num {
  font-family: 'Lexend', sans-serif;
  font-weight: 800;
  font-size: clamp(5rem, 16vw, 9rem);
  line-height: 1;
  color: var(--lacivert);
  letter-spacing: -.02em;
}
.notfound-illustration { max-width: 220px; margin: 0 auto 1.5rem; }
.notfound-actions .btn { min-width: 180px; }
</style>
</head>
<body>
<a class="skip-link" href="#ana-icerik">İçeriğe geç</a>
<div id="app-navbar"></div>
<a id="ana-icerik"></a>

<div class="container notfound-wrap">
  <div class="text-center mx-auto" style="max-width:560px;">
    <div class="notfound-illustration">
      <svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
        <rect x="70" y="60" width="160" height="120" rx="4" fill="none" stroke="#164194" stroke-width="3"/>
        <rect x="90" y="80" width="30" height="40" fill="#3AAA35"/>
        <rect x="135" y="80" width="30" height="40" fill="#EF7D00"/>
        <rect x="180" y="80" width="30" height="40" fill="#164194" opacity=".25"/>
        <rect x="90" y="135" width="120" height="12" fill="#164194" opacity=".6"/>
        <rect x="50" y="180" width="200" height="8" rx="2" fill="#164194" opacity=".18"/>
        <text x="150" y="45" text-anchor="middle" font-family="Lexend, sans-serif" font-weight="700" font-size="28" fill="#EF7D00">?</text>
      </svg>
    </div>
    <div class="notfound-num">404</div>
    <h1 class="text-navy fw-bold mt-2 mb-2" style="font-size:1.6rem;">Aradığınız sayfa bulunamadı</h1>
    <p class="text-muted mb-4">Bu sayfa taşınmış, kaldırılmış ya da hiç var olmamış olabilir. Adresi kontrol edin ya da aşağıdaki bağlantılardan devam edin.</p>
    <div class="d-flex flex-wrap justify-content-center gap-2 notfound-actions">
      <a href="index.html" class="btn btn-navy">Ana Sayfaya Dön</a>
      <a href="index.html#koleksiyon" class="btn btn-outline-navy">Kataloğu Keşfet</a>
      <a href="index.html#iletisim" class="btn btn-outline-navy">Bize Ulaşın</a>
    </div>
  </div>
</div>

<div id="app-footer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-config.js"></script>
<script src="assets/app.js"></script>
<script>
(async () => {
  await initPublicPage();
  renderPublicNavbar('');
  renderPublicFooter();
})();
</script>
</body>
</html>
