<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rapor - Yenişehir Kütüphane Sistemi</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="assets/style.css" rel="stylesheet">
<style>
.stat-card-btn {
  display: block;
  width: 100%;
  text-align: left;
  border: 1px solid var(--slate-200);
  border-top: 4px solid var(--lacivert);
  border-radius: var(--radius-sm);
  background: #fff;
  padding: 1.1rem 1.3rem;
  cursor: pointer;
  transition: box-shadow .18s ease, transform .18s ease;
}
.stat-card-btn:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.stat-card-btn.accent { border-top-color: var(--turuncu); }
.stat-card-btn.accent-green { border-top-color: var(--yesil); }
.stat-card-btn.active { outline: 2px solid var(--lacivert); }
.stat-card-btn .stat-value { font-size: 1.85rem; font-weight: 800; color: var(--lacivert-koyu); }
.stat-card-btn .stat-label { font-size: .85rem; color: var(--slate-500); }
#reportTabs .nav-link { white-space: nowrap; }
</style>
</head>
<body>
<a class="skip-link" href="#ana-icerik">İçeriğe geç</a>
<div id="app-navbar"></div>
<a id="ana-icerik"></a>

<div class="container py-4">
  <div id="login-required" class="d-none">
    <div class="alert alert-warning">Bu sayfayı görüntülemek için personel girişi yapmalısınız. <a href="personel-girisi.html">Personel Girişi &rarr;</a></div>
  </div>

  <div id="page-content" class="d-none">
    <h2 class="section-title mb-3">Rapor</h2>

    <ul class="nav nav-tabs mb-3 flex-nowrap overflow-auto" id="reportTabs"></ul>

    <div id="dynamicPanes"></div>
  </div>
</div>

<div class="modal fade" id="categoryBreakdownModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-navy" id="categoryModalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
      </div>
      <div class="modal-body" id="categoryModalBody"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-config.js"></script>
<script src="assets/app.js"></script>
<script>
/* -------------------------------------------------------------------------
   Durum
   ------------------------------------------------------------------------- */
let compareChartInstance = null;
let categoryPieChartInstance = null;
const chartInstances = {};       // prefix -> { category: Chart, trend: Chart }
const rankingsByPrefix = {};     // prefix -> { books: [...], users: [...], overdue: [...] }
const rankExpandState = {};      // "prefix:key" -> bool
const paneLibraryId = {};        // prefix -> libId (bu panonun ait olduğu kütüphane)
const overviewExpandState = {};  // prefix -> key|null (hangi kart genişletilmiş)
const overviewTrendMode = {};    // prefix -> 'daily' | 'weekday'
const overviewTrendRange = {};   // prefix -> { start, end } | undefined (özel tarih aralığı)
const overviewSearch = {};       // prefix -> arama metni
const overviewSort = {};         // prefix -> null | 'total_desc'
const overviewScope = {};        // prefix -> scope (libId ya da 'ALL')

(async () => {
  if (await initAdminPage('rapor', { requireLogin: true, requirePermission: ['view_reports', 'view_reports_all'] })) boot();
})();

function boot() {
  const data = getData();
  const admin = hasPermission('view_reports_all');
  buildTabsAndPanes(admin, data);

  if (admin) {
    document.getElementById('aLibrary').innerHTML += data.libraries.map(l => `<option value="${l.id}">${escapeHtml(l.name)}</option>`).join('');
    renderOverviewBlock('all', 'ALL');
    renderCompareTab();
    renderCategoryPieChart();
    renderAuditTab();
    data.libraries.forEach(lib => {
      const prefix = 'lib_' + lib.id;
      populateFilterDropdowns(prefix, lib.id, data);
      renderLibraryPane(prefix);
    });
  } else {
    populateFilterDropdowns('own', paneLibraryId.own, data);
    renderLibraryPane('own');
  }
}

/* -------------------------------------------------------------------------
   Sekmeler: yetkisi olmayan personel sadece "Kendi Kütüphanem" görür.
   "Tüm Kütüphaneler Raporu" yetkisi olan (view_reports_all) personel için
   her kütüphanenin kendi ayrı sekmesi + birleşik "Tüm Kütüphaneler" sekmesi
   + denetim sekmesi oluşturulur — tek ve belirsiz "Kendi Kütüphanem"
   sekmesi yerine, hangi kütüphaneye baktığı her zaman nettir.
   ------------------------------------------------------------------------- */

function buildTabsAndPanes(admin, data) {
  let navHtml = '';
  let panesHtml = '';
  let first = true;

  function addTab(key, label, contentHtml) {
    navHtml += `<li class="nav-item"><button class="nav-link ${first ? 'active' : ''}" data-tab="${key}" onclick="switchTab('${key}')">${escapeHtml(label)}</button></li>`;
    panesHtml += `<div id="tab-${key}" class="${first ? '' : 'd-none'}">${contentHtml}</div>`;
    first = false;
  }

  if (admin) {
    addTab('all', 'Tüm Kütüphaneler', `
      <div class="small text-uppercase text-muted fw-bold mb-2" style="letter-spacing:.06em;">Ana Yönetici Raporu — Tüm Kütüphaneler</div>
      <div id="allOverview" class="mb-4"></div>
      <div class="card p-3 mb-3">
        <h6 class="text-navy">Kütüphaneye Göre Kitap Dağılımı</h6>
        <div style="height:280px;"><canvas id="compareChart"></canvas></div>
      </div>
      <div class="card p-3 mb-3">
        <h6 class="text-navy">Kategorilere Göre Nüsha Dağılımı</h6>
        <div style="height:320px;"><canvas id="categoryPieChart"></canvas></div>
      </div>
      <div class="table-responsive-card">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead><tr><th>Kütüphane</th><th>Kategori Sayısı</th><th>Farklı Kitap Sayısı</th><th>Toplam Nüsha</th><th>Boşta Nüsha</th><th>Üye Sayısı</th><th>Aktif Ödünç</th><th>Gecikmiş</th><th>İmha Onayı Bekleyen</th></tr></thead>
            <tbody id="compareTable"></tbody>
          </table>
        </div>
      </div>`);

    data.libraries.forEach(lib => {
      const prefix = 'lib_' + lib.id;
      paneLibraryId[prefix] = lib.id;
      addTab(prefix, lib.name, libraryPaneTemplate(prefix));
    });

    addTab('audit', 'Kayıt & İmha Denetimi', auditPaneTemplate());
  } else {
    paneLibraryId.own = getEffectiveLibrary();
    addTab('own', 'Kendi Kütüphanem', libraryPaneTemplate('own'));
  }

  document.getElementById('reportTabs').innerHTML = navHtml;
  document.getElementById('dynamicPanes').innerHTML = panesHtml;
}

function switchTab(key) {
  document.querySelectorAll('#reportTabs .nav-link').forEach(el => el.classList.toggle('active', el.dataset.tab === key));
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.toggle('d-none', el.id !== 'tab-' + key));
  // Chart.js, d-none (display:none) durumundayken oluşturulan canvas'ları 0x0
  // boyutlandırır; sekme görünür olduktan sonra yeniden boyutlandırmak gerekir.
  requestAnimationFrame(() => {
    const charts = chartInstances[key];
    if (charts) {
      if (charts.trend) charts.trend.resize();
      if (charts.category) charts.category.resize();
    }
    if (key === 'all' && compareChartInstance) compareChartInstance.resize();
    if (key === 'all' && categoryPieChartInstance) categoryPieChartInstance.resize();
  });
}

function libraryPaneTemplate(prefix) {
  return `
    <div id="${prefix}Overview" class="mb-4"></div>

    <div class="card p-3 mb-3">
      <div class="row g-2">
        <div class="col-md-3"><label class="form-label small">Başlangıç</label><input type="date" id="${prefix}Start" class="form-control form-control-sm"></div>
        <div class="col-md-3"><label class="form-label small">Bitiş</label><input type="date" id="${prefix}End" class="form-control form-control-sm"></div>
        <div class="col-md-3"><label class="form-label small">Kategori</label><select id="${prefix}Category" class="form-select form-select-sm"><option value="">Tümü</option></select></div>
        <div class="col-md-3"><label class="form-label small">Durum</label>
          <select id="${prefix}Status" class="form-select form-select-sm">
            <option value="">Tümü</option><option value="active">Ödünçte</option><option value="overdue">Gecikmiş</option><option value="returned">İade Edildi</option><option value="lost">Kayıp</option>
          </select>
        </div>
        <div class="col-md-4"><label class="form-label small">Üye</label><select id="${prefix}User" class="form-select form-select-sm"><option value="">Tümü</option></select></div>
        <div class="col-md-4"><label class="form-label small">Kitap</label><select id="${prefix}Book" class="form-select form-select-sm"><option value="">Tümü</option></select></div>
        <div class="col-md-4 d-flex align-items-end"><button class="btn btn-navy btn-sm w-100" onclick="renderLibraryPane('${prefix}')">Filtrele</button></div>
      </div>
    </div>

    <div class="row g-3 mb-3" id="${prefix}StatCards"></div>

    <div class="card p-3 mb-3">
      <h6 class="text-navy">Kategoriye Göre Stok Durumu</h6>
      <div style="height:260px;"><canvas id="${prefix}CatChart"></canvas></div>
    </div>

    <div class="table-responsive-card mb-3">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Üye</th><th>Kitap</th><th>Alış</th><th>İade Tarihi</th><th>Durum</th></tr></thead>
          <tbody id="${prefix}ResultsTable"></tbody>
        </table>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="table-responsive-card">
          <h6 class="text-navy mb-2">En Çok Ödünç Alınan Kitaplar</h6>
          <ol class="list-group list-group-numbered" id="${prefix}TopBooksList"></ol>
          <button class="btn btn-link btn-sm mt-2" onclick="toggleRankExpand('${prefix}','books')" id="${prefix}ToggleBooksBtn">Tümünü Göster</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="table-responsive-card">
          <h6 class="text-navy mb-2">En Aktif Üyeler</h6>
          <ol class="list-group list-group-numbered" id="${prefix}TopUsersList"></ol>
          <button class="btn btn-link btn-sm mt-2" onclick="toggleRankExpand('${prefix}','users')" id="${prefix}ToggleUsersBtn">Tümünü Göster</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="table-responsive-card">
          <h6 class="text-navy mb-2">En Çok Geciktiren Üyeler</h6>
          <ol class="list-group list-group-numbered" id="${prefix}TopOverdueList"></ol>
          <button class="btn btn-link btn-sm mt-2" onclick="toggleRankExpand('${prefix}','overdue')" id="${prefix}ToggleOverdueBtn">Tümünü Göster</button>
        </div>
      </div>
    </div>`;
}

function auditPaneTemplate() {
  return `
    <div class="card p-3 mb-3">
      <div class="row g-2">
        <div class="col-md-3"><label class="form-label small">Başlangıç</label><input type="date" id="aStart" class="form-control form-control-sm"></div>
        <div class="col-md-3"><label class="form-label small">Bitiş</label><input type="date" id="aEnd" class="form-control form-control-sm"></div>
        <div class="col-md-3"><label class="form-label small">Kütüphane</label><select id="aLibrary" class="form-select form-select-sm"><option value="">Tümü</option></select></div>
        <div class="col-md-3 d-flex align-items-end"><button class="btn btn-navy btn-sm w-100" onclick="renderAuditTab()">Filtrele</button></div>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <div class="table-responsive-card">
          <h6 class="text-navy">Dönemde Eklenen Kitaplar</h6>
          <div class="table-responsive"><table class="table table-sm align-middle">
            <thead><tr><th>Kitap</th><th>Kütüphane</th><th>Tarih</th><th>Kaynak</th></tr></thead>
            <tbody id="auditAddedTable"></tbody>
          </table></div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="table-responsive-card">
          <h6 class="text-navy">İmha Kayıtları</h6>
          <div class="table-responsive"><table class="table table-sm align-middle">
            <thead><tr><th>Kitap</th><th>Kütüphane</th><th>Tarih</th><th>Durum</th></tr></thead>
            <tbody id="auditRetireTable"></tbody>
          </table></div>
        </div>
      </div>
    </div>`;
}

function populateFilterDropdowns(prefix, libId, data) {
  document.getElementById(prefix + 'Category').innerHTML += data.categories.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
  document.getElementById(prefix + 'User').innerHTML += data.users.filter(u => u.library === libId).map(u => `<option value="${u.id}">${escapeHtml(u.name)}</option>`).join('');
}

/* -------------------------------------------------------------------------
   Genel Bakış: toplam kitap / üye / aktif ödünç / gecikmiş / iade edilen
   — her sekme (kendi kütüphanem, her kütüphane, tüm kütüphaneler) için aynı
   bileşen; bir karta tıklanınca altında arama ve (kitaplar için) nüshaya
   göre sıralama yapılabilen bir detay tablosu açılır.
   ------------------------------------------------------------------------- */

function computeOverviewStats(scope) {
  const data = getData();
  const inScope = (libId) => scope === 'ALL' || libId === scope;
  const books = data.books.filter(b => inScope(b.library));
  const members = data.users.filter(u => inScope(u.library));
  const rentals = data.rentals.filter(r => {
    const book = data.books.find(b => b.id === r.bookId);
    return book && inScope(book.library);
  });
  const active = rentals.filter(r => !r.returnDate && !r.lost && rentalStatus(r).overdueDays === 0);
  const overdue = rentals.filter(r => !r.returnDate && !r.lost && rentalStatus(r).overdueDays > 0);
  const returned = rentals.filter(r => r.returnDate);
  const pendingLost = rentals.filter(r => !r.returnDate && r.lost);
  const totalCopies = books.reduce((s, b) => s + b.total, 0);
  return { books, members, rentals, active, overdue, returned, pendingLost, totalCopies };
}

function renderOverviewBlock(prefix, scope) {
  overviewScope[prefix] = scope;
  const stats = computeOverviewStats(scope);
  const cards = [
    { key: 'books', label: 'Toplam Kitap', val: stats.totalCopies, cls: '' },
    { key: 'members', label: 'Toplam Üye', val: stats.members.length, cls: '' },
    { key: 'active', label: 'Aktif Ödünç', val: stats.active.length, cls: 'accent-green' },
    { key: 'overdue', label: 'Gecikmiş', val: stats.overdue.length, cls: 'accent' },
    { key: 'returned', label: 'İade Edilen', val: stats.returned.length, cls: '' },
    { key: 'pendingLost', label: 'İmha Onayı Bekleyen', val: stats.pendingLost.length, cls: '' }
  ];
  const activeKey = overviewExpandState[prefix];
  const cardsHtml = cards.map(c => `
    <div class="col-6 col-md">
      <button type="button" class="stat-card-btn ${c.cls} ${activeKey === c.key ? 'active' : ''}" onclick="toggleOverviewDetail('${prefix}','${c.key}')">
        <div class="stat-value">${c.val}</div>
        <div class="stat-label">${escapeHtml(c.label)}</div>
      </button>
    </div>`).join('');

  const trendMode = overviewTrendMode[prefix] || 'daily';
  const modeSel = `
    <select class="form-select form-select-sm w-auto" onchange="setTrendMode('${prefix}', this.value)">
      <option value="daily" ${trendMode === 'daily' ? 'selected' : ''}>Son 30 Gün</option>
      <option value="weekday" ${trendMode === 'weekday' ? 'selected' : ''}>Haftanın Günlerine Göre</option>
    </select>`;

  const detailOpen = !!activeKey;
  document.getElementById(prefix + 'Overview').innerHTML = `
    <div class="row g-3 mb-3">${cardsHtml}</div>
    <div id="${prefix}DetailPanel" class="table-responsive-card mb-3 ${detailOpen ? '' : 'd-none'}">
      <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
        <h6 class="text-navy mb-0" id="${prefix}DetailTitle"></h6>
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <button class="btn btn-sm btn-outline-secondary ${activeKey === 'books' ? '' : 'd-none'}" id="${prefix}DetailSortBtn" onclick="toggleDetailSort('${prefix}')">
            <i class="bi bi-sort-numeric-down"></i> Nüshaya Göre Sırala
          </button>
          <button class="btn btn-sm btn-outline-secondary" onclick="exportDetailCsv('${prefix}')"><i class="bi bi-download"></i> CSV İndir</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="toggleOverviewDetail('${prefix}', null)">Kapat</button>
        </div>
      </div>
      <input type="text" class="form-control form-control-sm mb-2" style="max-width:320px;" placeholder="Ara..." id="${prefix}DetailSearch" value="${escapeHtml(overviewSearch[prefix] || '')}" oninput="onDetailSearch('${prefix}', this.value)">
      <div class="table-responsive"><table class="table table-sm align-middle"><thead id="${prefix}DetailHead"></thead><tbody id="${prefix}DetailBody"></tbody></table></div>
    </div>
    <div class="table-responsive-card mb-3">
      <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
        <h6 class="text-navy mb-0">Gün Gün Ödünç Verilen Kitap Sayısı</h6>
        ${modeSel}
      </div>
      <div class="d-flex align-items-end gap-2 flex-wrap mb-3">
        <div><label class="form-label small mb-0">Başlangıç</label><input type="date" id="${prefix}TrendStart" class="form-control form-control-sm" value="${(overviewTrendRange[prefix] && overviewTrendRange[prefix].start) || ''}"></div>
        <div><label class="form-label small mb-0">Bitiş</label><input type="date" id="${prefix}TrendEnd" class="form-control form-control-sm" value="${(overviewTrendRange[prefix] && overviewTrendRange[prefix].end) || ''}"></div>
        <button class="btn btn-sm btn-navy" onclick="applyTrendRange('${prefix}')">Uygula</button>
        <button class="btn btn-sm btn-outline-secondary ${overviewTrendRange[prefix] ? '' : 'd-none'}" id="${prefix}TrendClearBtn" onclick="clearTrendRange('${prefix}')">Temizle</button>
      </div>
      <div style="height:240px;"><canvas id="${prefix}TrendChart"></canvas></div>
    </div>`;

  if (detailOpen) renderOverviewDetail(prefix);
  renderTrendChart(prefix, scope);
}

function toggleOverviewDetail(prefix, key) {
  overviewExpandState[prefix] = (overviewExpandState[prefix] === key) ? null : key;
  overviewSearch[prefix] = '';
  overviewSort[prefix] = null;
  renderOverviewBlock(prefix, overviewScope[prefix]);
}

function onDetailSearch(prefix, term) {
  overviewSearch[prefix] = term;
  renderOverviewDetail(prefix);
}

function toggleDetailSort(prefix) {
  overviewSort[prefix] = overviewSort[prefix] === 'total_desc' ? null : 'total_desc';
  const btn = document.getElementById(prefix + 'DetailSortBtn');
  if (btn) btn.classList.toggle('active', overviewSort[prefix] === 'total_desc');
  renderOverviewDetail(prefix);
}

function renderOverviewDetail(prefix) {
  const key = overviewExpandState[prefix];
  if (!key) return;
  const scope = overviewScope[prefix];
  const data = getData();
  const stats = computeOverviewStats(scope);
  const showLibCol = scope === 'ALL';
  const term = (overviewSearch[prefix] || '').trim().toLowerCase();
  let head = '', rowsHtml = [];

  const titleMap = { books: 'Toplam Kitap', members: 'Toplam Üye', active: 'Aktif Ödünç', overdue: 'Gecikmiş', returned: 'İade Edilen', pendingLost: 'İmha Onayı Bekleyen' };
  document.getElementById(prefix + 'DetailTitle').textContent = titleMap[key] || '';

  if (key === 'books') {
    head = `<tr><th>Başlık</th><th>Yazar</th><th>Toplam Nüsha</th><th>Boşta</th>${showLibCol ? '<th>Kütüphane</th>' : ''}</tr>`;
    let list = stats.books;
    if (term) list = list.filter(b => b.title.toLowerCase().includes(term) || b.author.toLowerCase().includes(term));
    if (overviewSort[prefix] === 'total_desc') list = [...list].sort((a, c) => c.total - a.total);
    rowsHtml = list.map(b => `<tr><td>${escapeHtml(b.title)}</td><td>${escapeHtml(b.author)}</td><td>${b.total}</td><td>${b.stock}</td>${showLibCol ? `<td>${escapeHtml(libraryName(b.library))}</td>` : ''}</tr>`);
  } else if (key === 'members') {
    head = `<tr><th>Ad Soyad</th><th>Telefon</th>${showLibCol ? '<th>Kütüphane</th>' : ''}</tr>`;
    let list = stats.members;
    if (term) list = list.filter(u => u.name.toLowerCase().includes(term) || (u.phone || '').toLowerCase().includes(term));
    rowsHtml = list.map(u => `<tr><td>${escapeHtml(u.name)}</td><td>${escapeHtml(u.phone || '—')}</td>${showLibCol ? `<td>${escapeHtml(libraryName(u.library))}</td>` : ''}</tr>`);
  } else {
    const list0 = key === 'active' ? stats.active : key === 'overdue' ? stats.overdue : key === 'returned' ? stats.returned : stats.pendingLost;
    const dateColLabel = key === 'returned' ? 'İade Tarihi' : key === 'pendingLost' ? 'Kayıp Tarihi' : 'Vade Tarihi';
    head = `<tr><th>Üye</th><th>Kitap</th><th>Alış</th><th>${dateColLabel}</th>${key === 'overdue' ? '<th>Gecikme</th>' : ''}${showLibCol ? '<th>Kütüphane</th>' : ''}</tr>`;
    let joined = list0.map(r => ({
      r,
      user: data.users.find(u => u.id === r.userId) || { name: '—' },
      book: data.books.find(b => b.id === r.bookId) || { title: '—', library: null }
    }));
    if (term) joined = joined.filter(({ user, book }) => user.name.toLowerCase().includes(term) || book.title.toLowerCase().includes(term));
    rowsHtml = joined.map(({ r, user, book }) => {
      const st = rentalStatus(r);
      const dateCol = key === 'returned' ? formatDateTR(r.returnDate) : key === 'pendingLost' ? formatDateTR(r.lostDate) : formatDateTR(r.dueDate);
      const overdueCol = key === 'overdue' ? `<td class="text-danger fw-semibold">${st.overdueDays} gün</td>` : '';
      return `<tr><td>${escapeHtml(user.name)}</td><td>${escapeHtml(book.title)}</td><td>${formatDateTR(r.rentalDate)}</td><td>${dateCol}</td>${overdueCol}${showLibCol ? `<td>${escapeHtml(libraryName(book.library))}</td>` : ''}</tr>`;
    });
  }

  document.getElementById(prefix + 'DetailHead').innerHTML = head;
  const colCount = (head.match(/<th>/g) || []).length;
  document.getElementById(prefix + 'DetailBody').innerHTML = rowsHtml.join('') || `<tr><td colspan="${colCount}" class="text-center text-muted py-3">Kayıt yok.</td></tr>`;
}

function exportDetailCsv(prefix) {
  const table = document.querySelector('#' + prefix + 'DetailPanel table');
  if (!table) return;
  const rows = [...table.querySelectorAll('tr')].map(tr =>
    [...tr.children].map(cell => '"' + cell.textContent.replace(/"/g, '""').trim() + '"').join(',')
  );
  const csv = rows.join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${prefix}-${overviewExpandState[prefix] || 'rapor'}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function setTrendMode(prefix, mode) {
  overviewTrendMode[prefix] = mode;
  renderTrendChart(prefix, overviewScope[prefix]);
}

function applyTrendRange(prefix) {
  const start = document.getElementById(prefix + 'TrendStart').value;
  const end = document.getElementById(prefix + 'TrendEnd').value;
  if (!start || !end) { showToast('Başlangıç ve bitiş tarihi seçmelisiniz.', 'danger'); return; }
  if (start > end) { showToast('Başlangıç tarihi bitiş tarihinden sonra olamaz.', 'danger'); return; }
  const dayCount = Math.round((new Date(end) - new Date(start)) / 86400000) + 1;
  if (dayCount > 366) { showToast('En fazla 366 günlük bir aralık seçebilirsiniz.', 'danger'); return; }
  overviewTrendRange[prefix] = { start, end };
  const clearBtn = document.getElementById(prefix + 'TrendClearBtn');
  if (clearBtn) clearBtn.classList.remove('d-none');
  renderTrendChart(prefix, overviewScope[prefix]);
}

function clearTrendRange(prefix) {
  delete overviewTrendRange[prefix];
  document.getElementById(prefix + 'TrendStart').value = '';
  document.getElementById(prefix + 'TrendEnd').value = '';
  const clearBtn = document.getElementById(prefix + 'TrendClearBtn');
  if (clearBtn) clearBtn.classList.add('d-none');
  renderTrendChart(prefix, overviewScope[prefix]);
}

function renderTrendChart(prefix, scope) {
  const data = getData();
  let rentals = data.rentals.filter(r => {
    const book = data.books.find(b => b.id === r.bookId);
    return book && (scope === 'ALL' || book.library === scope);
  });

  const range = overviewTrendRange[prefix];
  if (range) rentals = rentals.filter(r => r.rentalDate >= range.start && r.rentalDate <= range.end);

  let labels, counts;
  if ((overviewTrendMode[prefix] || 'daily') === 'weekday') {
    const dayNames = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
    const order = [1, 2, 3, 4, 5, 6, 0]; // Pazartesi → Pazar
    const totals = new Array(7).fill(0);
    rentals.forEach(r => { const d = new Date(r.rentalDate); if (!isNaN(d)) totals[d.getDay()]++; });
    labels = order.map(i => dayNames[i]);
    counts = order.map(i => totals[i]);
  } else {
    const buckets = {};
    if (range) {
      const cursor = new Date(range.start);
      const endD = new Date(range.end);
      while (cursor <= endD) {
        buckets[cursor.toISOString().slice(0, 10)] = 0;
        cursor.setDate(cursor.getDate() + 1);
      }
    } else {
      const days = 30;
      const today = new Date();
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        buckets[d.toISOString().slice(0, 10)] = 0;
      }
    }
    rentals.forEach(r => { if (r.rentalDate in buckets) buckets[r.rentalDate]++; });
    labels = Object.keys(buckets).map(k => formatDateTR(k).slice(0, 5));
    counts = Object.values(buckets);
  }

  if (!chartInstances[prefix]) chartInstances[prefix] = {};
  if (chartInstances[prefix].trend) chartInstances[prefix].trend.destroy();
  chartInstances[prefix].trend = new Chart(document.getElementById(prefix + 'TrendChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Ödünç Verilen Kitap', data: counts, backgroundColor: '#164194', borderRadius: 4, maxBarThickness: 34 }] },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: 'rgba(11,21,38,.06)' } },
        x: { grid: { display: false } }
      }
    }
  });
}

/* -------------------------------------------------------------------------
   Kütüphane paneli (Kendi Kütüphanem / her kütüphanenin kendi sekmesi):
   filtre formu, genel bakış, kategori grafiği, sonuç tablosu, sıralamalar.
   ------------------------------------------------------------------------- */

function renderLibraryPane(prefix) {
  const libId = paneLibraryId[prefix];
  renderOverviewBlock(prefix, libId);

  const data = getData();
  const start = document.getElementById(prefix + 'Start').value;
  const end = document.getElementById(prefix + 'End').value;
  const catF = document.getElementById(prefix + 'Category').value;
  const statusF = document.getElementById(prefix + 'Status').value;
  const userF = document.getElementById(prefix + 'User').value;

  document.getElementById(prefix + 'Book').innerHTML = '<option value="">Tümü</option>' +
    data.books.filter(b => b.library === libId).map(b => `<option value="${b.id}">${escapeHtml(b.title)}</option>`).join('');
  const bookF = document.getElementById(prefix + 'Book').value;

  let rentals = data.rentals.filter(r => {
    const book = data.books.find(b => b.id === r.bookId);
    if (!book || book.library !== libId) return false;
    if (start && r.rentalDate < start) return false;
    if (end && r.rentalDate > end) return false;
    if (userF && r.userId !== userF) return false;
    if (bookF && r.bookId !== bookF) return false;
    if (catF) {
      const catMatch = Array.isArray(book.category) ? book.category.includes(catF) : book.category === catF;
      if (!catMatch) return false;
    }
    const st = rentalStatus(r);
    if (statusF === 'active' && (r.returnDate || r.lost || st.overdueDays > 0)) return false;
    if (statusF === 'overdue' && (r.lost || st.overdueDays <= 0)) return false;
    if (statusF === 'returned' && !r.returnDate) return false;
    if (statusF === 'lost' && !r.lost) return false;
    return true;
  });

  const totalCount = rentals.length;
  const activeCount = rentals.filter(r => !r.returnDate && !r.lost && rentalStatus(r).overdueDays === 0).length;
  const overdueCount = rentals.filter(r => !r.returnDate && !r.lost && rentalStatus(r).overdueDays > 0).length;
  const returnedCount = rentals.filter(r => r.returnDate).length;
  const lostCount = rentals.filter(r => r.lost).length;

  document.getElementById(prefix + 'StatCards').innerHTML = [
    ['Toplam Kayıt', totalCount, ''], ['Aktif Ödünçte', activeCount, 'accent-green'],
    ['Gecikmiş', overdueCount, 'accent'], ['İade Edilen', returnedCount, ''], ['Kayıp', lostCount, 'accent']
  ].map(([label, val, cls]) => `<div class="col-6 col-md-3"><div class="stat-card ${cls}"><div class="stat-value">${val}</div><div class="stat-label">${label}</div></div></div>`).join('');

  document.getElementById(prefix + 'ResultsTable').innerHTML = rentals.map(r => {
    const user = data.users.find(u => u.id === r.userId) || { name: '—' };
    const book = data.books.find(b => b.id === r.bookId) || { title: '—' };
    const st = rentalStatus(r);
    return `<tr><td>${escapeHtml(user.name)}</td><td>${escapeHtml(book.title)}</td><td>${formatDateTR(r.rentalDate)}</td><td>${formatDateTR(r.dueDate)}</td><td><span class="badge bg-${st.cls}">${st.label}</span></td></tr>`;
  }).join('') || '<tr><td colspan="5" class="text-center text-muted py-3">Kayıt bulunamadı.</td></tr>';

  // Grafik: kategoriye göre stok
  const libBooks = data.books.filter(b => b.library === libId);
  const catTotals = {};
  libBooks.forEach(b => {
    const cats = Array.isArray(b.category) ? b.category : [b.category];
    cats.forEach(cid => {
      const name = categoryName(cid) || 'Diğer';
      catTotals[name] = (catTotals[name] || 0) + b.stock;
    });
  });
  if (!chartInstances[prefix]) chartInstances[prefix] = {};
  if (chartInstances[prefix].category) chartInstances[prefix].category.destroy();
  chartInstances[prefix].category = new Chart(document.getElementById(prefix + 'CatChart'), {
    type: 'bar',
    data: { labels: Object.keys(catTotals), datasets: [{ label: 'Boşta Nüsha', data: Object.values(catTotals), backgroundColor: '#164194', borderRadius: 4, maxBarThickness: 48 }] },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: 'rgba(11,21,38,.06)' } },
        x: { grid: { display: false } }
      }
    }
  });

  // Sıralı listeler (tüm kayıtlar üzerinden, filtre olmadan — kütüphane bazlı)
  const libRentals = data.rentals.filter(r => { const b = data.books.find(x => x.id === r.bookId); return b && b.library === libId; });
  const bookCounts = {};
  libRentals.forEach(r => { bookCounts[r.bookId] = (bookCounts[r.bookId] || 0) + 1; });
  const bookRanking = Object.entries(bookCounts).map(([bid, cnt]) => ({ label: data.books.find(b => b.id === bid)?.title || '—', cnt })).sort((a, c) => c.cnt - a.cnt);

  const userCounts = {};
  libRentals.forEach(r => { userCounts[r.userId] = (userCounts[r.userId] || 0) + 1; });
  const userRanking = Object.entries(userCounts).map(([uid, cnt]) => ({ label: data.users.find(u => u.id === uid)?.name || '—', cnt })).sort((a, c) => c.cnt - a.cnt);

  const overdueCounts = {};
  libRentals.forEach(r => { if (rentalStatus(r).overdueDays > 0) overdueCounts[r.userId] = (overdueCounts[r.userId] || 0) + 1; });
  const overdueRanking = Object.entries(overdueCounts).map(([uid, cnt]) => ({ label: data.users.find(u => u.id === uid)?.name || '—', cnt })).sort((a, c) => c.cnt - a.cnt);

  rankingsByPrefix[prefix] = { books: bookRanking, users: userRanking, overdue: overdueRanking };
  renderRankingList(prefix, 'books');
  renderRankingList(prefix, 'users');
  renderRankingList(prefix, 'overdue');
}

function renderRankingList(prefix, key) {
  const list = (rankingsByPrefix[prefix] && rankingsByPrefix[prefix][key]) || [];
  const stateKey = prefix + ':' + key;
  const shown = rankExpandState[stateKey] ? list : list.slice(0, 10);
  const elSuffix = { books: 'TopBooksList', users: 'TopUsersList', overdue: 'TopOverdueList' }[key];
  document.getElementById(prefix + elSuffix).innerHTML = shown.map(item => `<li class="list-group-item d-flex justify-content-between"><span>${escapeHtml(item.label)}</span><span class="badge bg-navy">${item.cnt}</span></li>`).join('') || '<li class="list-group-item text-muted">Veri yok.</li>';
}

function toggleRankExpand(prefix, key) {
  const stateKey = prefix + ':' + key;
  rankExpandState[stateKey] = !rankExpandState[stateKey];
  const btnSuffix = { books: 'ToggleBooksBtn', users: 'ToggleUsersBtn', overdue: 'ToggleOverdueBtn' }[key];
  document.getElementById(prefix + btnSuffix).textContent = rankExpandState[stateKey] ? 'Daralt' : 'Tümünü Göster';
  renderRankingList(prefix, key);
}

/* -------------------------------------------------------------------------
   Tüm Kütüphaneler: kütüphaneye göre karşılaştırma tablosu ve grafiği
   ------------------------------------------------------------------------- */

function renderCompareTab() {
  const data = getData();
  document.getElementById('compareTable').innerHTML = data.libraries.map(lib => {
    const libBooks = data.books.filter(b => b.library === lib.id);
    const titles = libBooks.length;
    const total = libBooks.reduce((s, b) => s + b.total, 0);
    const free = libBooks.reduce((s, b) => s + b.stock, 0);
    const members = data.users.filter(u => u.library === lib.id).length;
    const libRentals = data.rentals.filter(r => { const b = data.books.find(x => x.id === r.bookId); return b && b.library === lib.id; });
    const active = libRentals.filter(r => !r.returnDate && !r.lost && rentalStatus(r).overdueDays === 0).length;
    const overdue = libRentals.filter(r => !r.returnDate && !r.lost && rentalStatus(r).overdueDays > 0).length;
    const pendingLost = libRentals.filter(r => !r.returnDate && r.lost).length;
    const catSet = new Set();
    libBooks.forEach(b => { (Array.isArray(b.category) ? b.category : [b.category]).forEach(c => { if (c) catSet.add(c); }); });
    return `<tr>
      <td>${escapeHtml(lib.name)}</td>
      <td><button type="button" class="btn btn-link btn-sm p-0 fw-semibold" onclick="openCategoryBreakdown('${lib.id}')">${catSet.size}</button></td>
      <td>${titles}</td><td>${total}</td><td>${free}</td><td>${members}</td><td>${active}</td><td class="text-danger">${overdue}</td><td>${pendingLost}</td>
    </tr>`;
  }).join('');

  if (compareChartInstance) compareChartInstance.destroy();
  compareChartInstance = new Chart(document.getElementById('compareChart'), {
    type: 'bar',
    data: {
      labels: data.libraries.map(l => l.name),
      datasets: [
        { label: 'Toplam Nüsha', data: data.libraries.map(l => data.books.filter(b => b.library === l.id).reduce((s, b) => s + b.total, 0)), backgroundColor: '#164194', borderRadius: 4, maxBarThickness: 56 },
        { label: 'Boşta Nüsha', data: data.libraries.map(l => data.books.filter(b => b.library === l.id).reduce((s, b) => s + b.stock, 0)), backgroundColor: '#3AAA35', borderRadius: 4, maxBarThickness: 56 }
      ]
    },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { position: 'top', align: 'start', labels: { boxWidth: 14, usePointStyle: true, pointStyle: 'circle' } } },
      scales: {
        y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: 'rgba(11,21,38,.06)' } },
        x: { grid: { display: false } }
      }
    }
  });
}

const CATEGORY_CHART_COLORS = ['#164194', '#3AAA35', '#EF7D00', '#5B7FBD', '#C9622A', '#2C7A6B', '#8A5A12', '#7C4DBE', '#C4457A', '#5B6472'];

/* Tüm kütüphaneler genelinde, kategorilere göre toplam nüsha dağılımı */
function renderCategoryPieChart() {
  const data = getData();
  const catTotals = {};
  data.books.forEach(b => {
    (Array.isArray(b.category) ? b.category : [b.category]).forEach(cid => {
      const name = categoryName(cid) || 'Diğer';
      catTotals[name] = (catTotals[name] || 0) + b.total;
    });
  });
  const entries = Object.entries(catTotals).sort((a, c) => c[1] - a[1]);

  if (categoryPieChartInstance) categoryPieChartInstance.destroy();
  categoryPieChartInstance = new Chart(document.getElementById('categoryPieChart'), {
    type: 'pie',
    data: {
      labels: entries.map(([name]) => name),
      datasets: [{ data: entries.map(([, val]) => val), backgroundColor: entries.map((_, i) => CATEGORY_CHART_COLORS[i % CATEGORY_CHART_COLORS.length]), borderColor: '#fff', borderWidth: 2 }]
    },
    options: {
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { boxWidth: 14, usePointStyle: true, pointStyle: 'circle' } },
        tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.parsed} nüsha` } }
      }
    }
  });
}

/* Bir kütüphanenin kategori sayısına tıklanınca: her kategoride kaç farklı
   kitap, kaç nüsha, kaç boşta, kaç aktif ve kaç gecikmiş ödünç var — modal
   içinde satır satır gösterilir. */
function openCategoryBreakdown(libId) {
  const data = getData();
  const lib = data.libraries.find(l => l.id === libId);
  const libBooks = data.books.filter(b => b.library === libId);
  const libRentals = data.rentals.filter(r => { const b = data.books.find(x => x.id === r.bookId); return b && b.library === libId; });

  const perCat = {};
  libBooks.forEach(b => {
    (Array.isArray(b.category) ? b.category : [b.category]).forEach(cid => {
      if (!cid) return;
      if (!perCat[cid]) perCat[cid] = { bookIds: new Set(), total: 0, stock: 0 };
      perCat[cid].bookIds.add(b.id);
      perCat[cid].total += b.total;
      perCat[cid].stock += b.stock;
    });
  });

  const activeByCat = {}, overdueByCat = {};
  libRentals.forEach(r => {
    const book = data.books.find(b => b.id === r.bookId);
    if (!book) return;
    const st = rentalStatus(r);
    const isActive = !r.returnDate && !r.lost && st.overdueDays === 0;
    const isOverdue = !r.returnDate && !r.lost && st.overdueDays > 0;
    if (!isActive && !isOverdue) return;
    (Array.isArray(book.category) ? book.category : [book.category]).forEach(cid => {
      if (!cid) return;
      if (isActive) activeByCat[cid] = (activeByCat[cid] || 0) + 1;
      if (isOverdue) overdueByCat[cid] = (overdueByCat[cid] || 0) + 1;
    });
  });

  const rows = Object.entries(perCat).map(([cid, v]) => ({
    name: categoryName(cid) || 'Diğer',
    books: v.bookIds.size,
    total: v.total,
    stock: v.stock,
    active: activeByCat[cid] || 0,
    overdue: overdueByCat[cid] || 0
  })).sort((a, c) => c.total - a.total);

  document.getElementById('categoryModalTitle').textContent = `Kategori Dağılımı — ${lib ? lib.name : ''}`;
  document.getElementById('categoryModalBody').innerHTML = `
    <div class="table-responsive"><table class="table table-sm align-middle">
      <thead><tr><th>Kategori</th><th>Kitap Sayısı</th><th>Nüsha Sayısı</th><th>Boşta</th><th>Aktif</th><th>Gecikmiş</th></tr></thead>
      <tbody>${rows.map(r => `<tr><td>${escapeHtml(r.name)}</td><td>${r.books}</td><td>${r.total}</td><td>${r.stock}</td><td>${r.active}</td><td class="text-danger">${r.overdue}</td></tr>`).join('') || '<tr><td colspan="6" class="text-center text-muted py-3">Kategori verisi yok.</td></tr>'}</tbody>
    </table></div>`;
  new bootstrap.Modal(document.getElementById('categoryBreakdownModal')).show();
}

function renderAuditTab() {
  const data = getData();
  const start = document.getElementById('aStart').value;
  const end = document.getElementById('aEnd').value;
  const libF = document.getElementById('aLibrary').value;

  let addedBooks = data.books.filter(b => {
    if (libF && b.library !== libF) return false;
    if (start && b.addedDate < start) return false;
    if (end && b.addedDate > end) return false;
    return true;
  });
  document.getElementById('auditAddedTable').innerHTML = addedBooks.map(b => `<tr><td>${escapeHtml(b.title)}</td><td>${escapeHtml(libraryName(b.library))}</td><td>${formatDateTR(b.addedDate)}</td><td>${escapeHtml(b.source)}</td></tr>`).join('') || '<tr><td colspan="4" class="text-center text-muted py-3">Kayıt yok.</td></tr>';

  let retirements = data.retirements.filter(r => {
    if (libF && r.library !== libF) return false;
    if (start && r.date < start) return false;
    if (end && r.date > end) return false;
    return true;
  });
  const statusLabel = { pending: '<span class="badge bg-orange">Onay Bekliyor</span>', approved: '<span class="badge bg-green">Onaylandı</span>', rejected: '<span class="badge bg-secondary">Reddedildi</span>' };
  document.getElementById('auditRetireTable').innerHTML = retirements.map(r => `<tr><td>${escapeHtml(r.title)}</td><td>${escapeHtml(libraryName(r.library))}</td><td>${formatDateTR(r.date)}</td><td>${statusLabel[r.status] || ''}</td></tr>`).join('') || '<tr><td colspan="4" class="text-center text-muted py-3">Kayıt yok.</td></tr>';
}
